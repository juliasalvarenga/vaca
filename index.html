<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Our World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="password-gate">
    <div class="password-gate-inner">
      <form id="password-form">
        <input type="password" id="password-input" placeholder="Password" autocomplete="off" autofocus>
        <button type="submit" class="btn btn-unlock">Unlock</button>
      </form>
      <p id="password-error" class="password-error hidden"></p>
    </div>
  </div>

  <div id="viewport">
    <div id="canvas">
      <p class="canvas-quote" aria-hidden="true">Build therefore your own world. As fast as you conform your life to the pure idea in your mind, that will unfold its great proportions.</p>
      <div id="canvas-items"></div>
    </div>
  </div>

  <div id="toolbar">
    <button class="tool-btn" data-type="photo" title="Add Photo">
      <i data-lucide="camera" class="tool-icon"></i>
      <span class="tool-label">Photo</span>
    </button>
    <button class="tool-btn" data-type="sticky" title="Add Sticky Note">
      <i data-lucide="sticky-note" class="tool-icon"></i>
      <span class="tool-label">Note</span>
    </button>
    <button class="tool-btn" data-type="date" title="Add Date Log">
      <i data-lucide="calendar-days" class="tool-icon"></i>
      <span class="tool-label">Date</span>
    </button>
    <button class="tool-btn" data-type="spot" title="Add Favorite Spot">
      <i data-lucide="map-pin" class="tool-icon"></i>
      <span class="tool-label">Spot</span>
    </button>
    <button class="tool-btn" data-type="food" title="Add Favorite Food">
      <i data-lucide="utensils-crossed" class="tool-icon"></i>
      <span class="tool-label">Food</span>
    </button>
    <button class="tool-btn" data-type="letter" title="Add Love Letter">
      <i data-lucide="heart" class="tool-icon"></i>
      <span class="tool-label">Letter</span>
    </button>
    <button class="tool-btn" data-type="memory" title="Add Memory">
      <i data-lucide="sparkles" class="tool-icon"></i>
      <span class="tool-label">Memory</span>
    </button>
    <button class="tool-btn" data-type="bucketlist" title="Bucket List">
      <i data-lucide="list-checks" class="tool-icon"></i>
      <span class="tool-label">Bucket</span>
    </button>
    <button class="tool-btn" data-type="quote" title="Quote / Inside Joke">
      <i data-lucide="message-circle" class="tool-icon"></i>
      <span class="tool-label">Quote</span>
    </button>
    <div class="tool-separator"></div>
    <button class="tool-btn utility" id="btn-collab" title="Collaborate">
      <i data-lucide="users" class="tool-icon"></i>
      <span class="tool-label">Together</span>
    </button>
    <div class="tool-separator"></div>
    <button class="tool-btn utility" id="btn-fit" title="Fit All Items">
      <i data-lucide="scan-search" class="tool-icon"></i>
      <span class="tool-label">Fit All</span>
    </button>
  </div>

  <div id="zoom-indicator">100%</div>
  <div id="sync-indicator" class="sync-indicator hidden" title="Sync status">—</div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn btn-cancel">Cancel</button>
        <button id="modal-save" class="btn btn-save">Save</button>
      </div>
    </div>
  </div>

  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <p>Delete this item?</p>
      <div class="confirm-buttons">
        <button id="confirm-no" class="btn btn-cancel">No</button>
        <button id="confirm-yes" class="btn btn-save">Yes</button>
      </div>
    </div>
  </div>

  <div id="collab-panel" class="hidden">
    <div class="collab-content">
      <h3><i data-lucide="users" class="collab-title-icon"></i> Edit together</h3>
      <p class="collab-hint">Share the same room code to see changes in real time.</p>
      <div class="form-group">
        <label>Room code</label>
        <input type="text" id="collab-room-input" placeholder="e.g. ABC123" maxlength="12">
      </div>
      <div class="collab-actions">
        <button id="collab-join" class="btn btn-save">Join room</button>
        <button id="collab-create" class="btn btn-cancel">Create new room</button>
      </div>
      <div id="collab-status" class="collab-status hidden"></div>
      <button id="collab-close" class="collab-close">&times;</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <!-- Optional: set Firebase for sync (copy firebase-config.example.js to firebase-config.js and add your config) -->
  <script src="js/firebase-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
